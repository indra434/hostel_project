<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormSync | Secure Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 1. MATCHING MOTION BACKGROUND */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #4b6cb7, #182848, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* 2. GLASS CARD */
        .login-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .title { color: #1a2a6c; font-weight: 800; text-align: center; }

        /* 3. SMOOTH HOVER BUTTONS FOR REGISTRATION */
        .register-option {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            color: #4a4a4a;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: block;
            text-decoration: none;
        }

        /* The "Smooth Move" Animation on Hover */
        .register-option:hover {
            transform: translateY(-8px);
            background: white;
            color: #6a11cb;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #6a11cb;
        }

        .login-btn {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            border-radius: 12px;
            font-weight: 700;
            height: 3rem;
            transition: 0.3s;
        }

        .login-btn:hover { transform: scale(1.02); }
    </style>
</head>
<body>

<div class="login-card">
    <h1 class="title is-3 mb-5">Login</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="notification is-danger is-light py-2 px-3 mb-4 is-size-7">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
        <div class="field">
            <div class="control has-icons-left">
                <input class="input is-medium" type="text" name="username" placeholder="Username" required style="border-radius: 10px;">
                <span class="icon is-left"><i class="fas fa-user"></i></span>
            </div>
        </div>

        <div class="field">
            <div class="control has-icons-left">
                <input class="input is-medium" type="password" name="password" placeholder="Password" required style="border-radius: 10px;">
                <span class="icon is-left"><i class="fas fa-lock"></i></span>
            </div>
        </div>

        <button class="button is-link is-fullwidth login-btn mb-4">LOGIN</button>

        <div class="has-text-centered mb-5">
            <a href="{{ url_for('forgot_password') }}" class="is-size-7 has-text-grey">Forgot Password?</a>
        </div>

        <hr style="height: 1px; background-color: #eee;">
        <p class="has-text-centered is-size-7 mb-4 has-text-grey">Register as:</p>

        <div class="columns is-mobile is-multiline">
            <div class="column is-6">
                <a href="{{ url_for('register', role='student') }}" class="register-option">Student</a>
            </div>
            <div class="column is-6">
                <a href="{{ url_for('register', role='principal') }}" class="register-option">Principal</a>
            </div>
            <div class="column is-6">
                <a href="{{ url_for('register', role='warden') }}" class="register-option">Warden</a>
            </div>
            <div class="column is-6">
                <a href="{{ url_for('register', role='guardian') }}" class="register-option">Guardian</a>
            </div>
        </div>
    </form>
</div>

</body>
</html>
