<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DormSync | Reset Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            background: linear-gradient(-45deg, #4b6cb7, #182848, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .forgot-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(15px);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input { border-radius: 10px; }
        
        .btn-otp {
            background: linear-gradient(to right, #00b09b, #96c93d);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            height: 3rem;
            transition: 0.3s;
        }

        .btn-otp:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(0,176,155,0.3); }
    </style>
</head>
<body>

<div class="forgot-card">
    <h1 class="title is-4">Forgot Password?</h1>
    <p class="subtitle is-6 has-text-grey mb-5">Enter your email or phone to get an OTP.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="notification is-{{ 'danger' if category == 'error' else 'success' }} is-light is-size-7">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% if error %}
        <div class="notification is-danger is-light is-size-7 mb-4">
            {{ error }}
        </div>
    {% endif %}

    <form action="{{ url_for('forgot_password') }}" method="POST">
        <div class="field">
            <div class="control has-icons-left">
                <input class="input is-medium" type="text" name="contact" placeholder="Email or Phone" required>
                <span class="icon is-left"><i class="fas fa-envelope"></i></span>
            </div>
        </div>

        <button type="submit" class="button is-fullwidth btn-otp mb-4">Send OTP</button>   
        
        <div class="mt-5">
            <a href="{{ url_for('login') }}" class="is-size-7 has-text-grey">
                <i class="fas fa-arrow-left mr-1"></i> Back to Login
            </a>
        </div>
    </form>
</div>

</body>
</html>
