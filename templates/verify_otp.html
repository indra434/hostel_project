<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        :root {
            --primary-btn: #28a745; /* Green for "Verify" */
            --primary-hover: #218838;
            --text-main: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        /* --- SHARED LIVE GRADIENT BACKGROUND --- */
        body {
            margin: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- ANIMATED FLOATING BALLS --- */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            z-index: 1;
            animation: moveAround 20s infinite linear;
        }

        .c1 { width: 120px; height: 120px; top: 15%; left: 15%; animation-duration: 12s; }
        .c2 { width: 200px; height: 200px; bottom: 10%; right: 10%; animation-duration: 20s; animation-direction: reverse; }
        .c3 { width: 80px; height: 80px; top: 70%; left: 25%; animation-duration: 15s; }

        @keyframes moveAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(60px, 100px) rotate(180deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        /* --- GLASS CONTAINER --- */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h2 {
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* --- INPUT STYLING --- */
        .otp-input {
            width: 100%;
            padding: 16px;
            margin-bottom: 20px;
            border: 2px solid #eee;
            border-radius: 14px;
            outline: none;
            transition: 0.3s;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px; /* Makes it look like an OTP field */
            font-weight: bold;
        }

        .otp-input:focus {
            border-color: var(--primary-btn);
            box-shadow: 0 0 12px rgba(40, 167, 69, 0.15);
        }

        /* --- BUTTON STYLING --- */
        button {
            width: 100%;
            padding: 16px;
            background: var(--primary-btn);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.2);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.3);
        }

        /* --- ERROR MESSAGE --- */
        .flash-error {
            background-color: #ffe5e5;
            color: #d32f2f;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border: 1px solid #fecaca;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>

    <div class="container">
        <h2>Verify OTP</h2>

        {% if error %}
            <div class="flash-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/verify_otp">
            <input type="text" name="otp" class="otp-input" placeholder="XXXXXX" maxlength="6" required>
            <button type="submit">Verify & Proceed</button>
        </form>
    </div>
</body>
</html>
